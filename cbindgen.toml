language = "C++"
header = "/* Generated by cbindgen - DO NOT EDIT */"
include_guard = "QEM_SIMPLIFIER_H"
autogen_static_asserts = true
no_includes = false
namespace = "qem"
braces = "SameLine"
line_length = 100
tab_width = 4

[export]
include = [
    "LogCallback",
    "ProgressCallback",
    "QemProgressEvent",
    "QemMeshView",
    "QemSimplifyOptions",
    "QemSimplifyResult",
    "QemSceneMeshView",
    "QemSceneMeshFeature",
    "QemSceneGraphNodeView",
    "QemSceneGraphMeshBindingView",
    "QemSceneGraphView",
    "QemScenePolicy",
    "QemSceneExecutionOptions",
    "QemSceneMeshDecision",
    "QemSceneMeshResult",
    "QemSceneSimplifyResult",
    "QemSceneMeshStatistics",
    "QemSceneStatisticsSummary",
]

[fn]
rename_args = "snake_case"

[struct]
derive_constructor = true
derive_eq = true
derive_copy = true
