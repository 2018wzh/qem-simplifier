[package]
name = "qem-simplifier"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "qem-cli"
path = "src/main.rs"

[features]
default = ["weight_by_area"]
weight_by_area = []

[dependencies]
clap = { version = "4.5", features = ["derive"] }
tobj = "4.0"
gltf = "1.4"
glam = "0.29"
byteorder = "1.5"
